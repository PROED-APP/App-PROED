<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Convivencia Escolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Lexend', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-[#1754cf] p-4 text-white shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold">Gestión Escolar</h1>
        <div id="perfil-selector" class="space-x-2">
            <button onclick="switchView('teacher')" class="bg-white/20 px-3 py-1 rounded text-sm">Profesor</button>
            <button onclick="switchView('admin')" class="bg-white/20 px-3 py-1 rounded text-sm">Admin</button>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <section id="view-teacher" class="view">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">Panel del Docente</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="student-list">
                </div>
        </section>

        <section id="view-admin" class="view hidden">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">Administración</h2>
            <div class="bg-white p-6 rounded-lg shadow">
                <p class="mb-4">Control total del ciclo escolar.</p>
                <button onclick="closeYear()" class="bg-red-600 text-white px-6 py-2 rounded hover:bg-red-700">
                    Cerrar Ciclo Escolar y Archivar
                </button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
